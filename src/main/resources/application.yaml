
server:
  port: 8080

spring:
  profiles:
     active: t1
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    username: appss #${APPS_USER}
    password: test123 #${APPS_PASSWORD}
    url: jdbc:oracle:thin:@d26dbfl027.test.local:1607:oebst1 #${DB_URL}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.Oracle12cDialect
    show-sql: false
    open-in-view: false
  application:
    name: oebs-mainmanager-api-t1 #${APP_NAME}

oebs:
  environment: Oebst1
  version: 0.3.0
  date: 10.09.2024

mainmanager:
  vendors:
    usted: ${MM_VENDORS}
    sted: ${MM_VENDORS_STED}
  url:
    token: ${MM_URL_TOKEN}
  artskonto: ${MM_ART}
  kostnadssted: ${MM_KOSTNADSSTED}
  produkt: ${MM_PRODUKT}
  oppgave: ${MM_OPPGAVE}
  statsregnskapskonto: ${MM_STATSREGNSKAPSKONTO}
  felles: ${MM_FELLES}
  username: ${MM_USER}
  password: ${MM_PASSWORD}
  grant_type: ${MM_GRANT_TYPE}

debug: true


management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics

springdoc:
  packagesToScan: no.nav.oebs.api.controller
  override-with-generic-response: false
  remove-broken-reference-definitions: false
  swagger-ui:
    disable-swagger-default-url: true
    tags-sorter: alpha

logging:
  level:
    com.zaxxer.hikari: DEBUG
    # root: DEBUG
    # org.springframework.web: debug
    # org.hibernate: error
    # org.springframework: DEBUG
