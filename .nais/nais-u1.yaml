apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: oebs-mainmanager-api-u1
  namespace: team-oebs
  labels:
    team: team-oebs
spec:
  image: repo.adeo.no:5443/oebs/oebs-mainmanager-api:0.0.5
  port: 8080
  replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 50
  liveness:
    path: /internal/isalive
    initialDelay: 60
    timeout: 10
  readiness:
    path: /internal/isready
    initialDelay: 60
    timeout: 10
  resources:
    requests:
      cpu: 400m
      memory: 1024Mi
    limits:
      cpu: 4000m
      memory: 2048Mi
  azure:
    application:
      enabled: true
      allowAllUsers: true
      #claims:
      #    groups:
      #        - id: 9e95e01a-126c-4ce8-b4ad-169a0a533624  # 0000-GA-Oebs-mainmanager-test
      tenant: nav.no
  #accessPolicy:
  #  inbound:
  #    rules:
  #       - application: oebs-api-ve-u1
  #         namespace: team-oebs
  #         cluster: dev-fss

  prometheus:
    enabled: true
    path: /actuator/prometheus
  vault:
    enabled: true
    paths:
      - kvPath: "kv/preprod/fss/oebs-mainmanager-api-u1/team-oebs"
        mountPath: "/var/run/secrets/nais.io/vault"

  ingresses:
     - "https://oebs-mainmanager-api-u1.dev.intern.nav.no"
