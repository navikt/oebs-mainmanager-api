apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: oebs-mainmanager-api
  namespace: team-oebs
  labels:
    team: team-oebs
spec:
  image: repo.adeo.no:5443/oebs/oebs-mainmanager-api:0.0.0
  port: 8080
  replicas:
    min: 3
    max: 3
    cpuThresholdPercentage: 50
  liveness:
    path: /internal/isalive
    initialDelay: 60
    timeout: 10
  readiness:
    path: /internal/isready
    initialDelay: 60
    timeout: 20
  resources:
    requests:
      cpu: 400m
      memory: 1024Mi
    limits:
      cpu: 4000m
      memory: 2048Mi
  azure:
    application:
      enabled: true
      allowAllUsers: true
  accessPolicy:
    inbound:
      rules:
         - application: oebs-api-ve
           namespace: team-oebs
           cluster: prod-fss
    outbound:
      external:
        - host: nav.eye-share.com
        - host: nav.controller.no
        - host: controller-api-prod.developer.azure-api.net

  prometheus:
    enabled: true
    path: /actuator/prometheus
  vault:
    enabled: true
    paths:
      - kvPath: "kv/prod/fss/oebs-mainmanager-api/team-oebs"
        mountPath: "/var/run/secrets/nais.io/vault"

  ingresses:
     - "https://oebs-mainmanager-api.intern.nav.no"
