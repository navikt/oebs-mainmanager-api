apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: oebs-mainmanager-api-t1
  namespace: team-oebs
  labels:
    app: oebs-mainmanager-api-t1
    team: team-oebs

spec:
  image: {{ image }}
  port: 8080
  replicas:
    min: 1
    max: 1

  resources:
    requests:
      cpu: 10m
      memory: 448Mi
    limits:
     # cpu: 4000m
      memory: 512Mi

  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
  azure:
    application:
      enabled: true
      allowAllUsers: true
      tenant: trygdeetaten.no
  envFrom:
    - secret: main-manager

  accessPolicy:
    outbound:
      external:
        - host: nav-test.mainmanager.no
        - host: a34duvw10783.devillo.no
        - ipv4: 10.52.64.43
          ports:
              - port: 1607

        - ipv4: 10.53.104.46  # dmv43db01.adeo.no
          ports:
            - port: 1521
        - ipv4: 10.53.104.48  # dmv43db02.adeo.no
          ports:
            - port: 1521
        - ipv4: 10.53.104.47  # dm43db01-vip.adeo.no
          ports:
            - port: 1521
        - ipv4: 10.53.104.49  # dmv43db02-vip.adeo.no
          ports:
            - port: 1521

        - ipv4: 10.53.104.43  # dmv43-scan.adeo.no
          ports:
            - port: 1521
        - ipv4: 10.53.104.44  # dmv43-scan.adeo.no
          ports:
            - port: 1521
        - ipv4: 10.53.104.45  # dmv43-scan.adeo.no
          ports:
            - port: 1521

  prometheus:
    enabled: true
    path: /actuator/prometheus

  ingresses:
     - "https://oebs-mainmanager-api-t1.intern.dev.nav.no"
     - "https://oebs-mainmanager-api-t1.ekstern.dev.nav.no"
