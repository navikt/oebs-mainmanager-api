apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: oebs-mainmanager-api-t1
  namespace: team-oebs
  labels:
    app: oebs-mainmanager-api-t1
    team: team-oebs
spec:
  image: {{ image }}
  port: 8080
  replicas:
    min: 1
    max: 1
    #cpuThresholdPercentage: 50
  #liveness:
    #path: /internal/isalive
    #initialDelay: 60
    #timeout: 10
  #readiness:
    #path: /internal/isready
    #initialDelay: 60
    #timeout: 10
  resources:
    requests:
      cpu: 400m
      memory: 1024Mi
    limits:
      cpu: 4000m
      memory: 2048Mi
  azure:
    application:
      enabled: true
      allowAllUsers: true
      tenant: trygdeetaten.no
  envFrom:
    - secret: main-manager

  accessPolicy:
    outbound:
      external:
        - host: nav-test.mainmanager.no
        - host: a34duvw10783.devillo.no

    inbound:
      external:
        - host: nav-test.mainmanager.no
        - host: a34duvw10783.devillo.no

  prometheus:
    enabled: true
    path: /actuator/prometheus

  ingresses:
     - "https://oebs-mainmanager-api-t1.intern.dev.nav.no"
     - "https://oebs-mainmanager-api-t1.ekstern.dev.nav.no"
