name: Build and push and deploy
on:
  push:
    branches:
      - 'dev/**'
      - 'main'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build_and_push:
    #permissions:
    #  contents: "read"
    #  id-token: "write"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - uses: nais/docker-build-push@v0
        id: docker-push
        with:
          team: team-oebs # required
          tenant: nav # optional
          push_image: true
          pull: true
          dockerfile: Dockerfile
          docker_context: .
          cache_from: type=gha
          cache_to: type=gha,mode=max
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }} # required, but is defined as an organization variable
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }} # required, but is defined as an organization secret
          salsa: true

  deploy-dev-t1:
    name: Deploy to NAIS Dev (T1)
    if: startsWith(github.ref, 'refs/heads/dev/t1') # || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/nais-t1.yaml
          IMAGE: ${{ steps.docker-push.outputs.image }}

  deploy-dev-q1:
    name: Deploy to NAIS dev (Q1)
    if: startsWith(github.ref, 'refs/heads/dev/q1') # || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/nais-q1.yaml
          IMAGE: ${{ steps.docker-push.outputs.image }}

  deploy-prod:
      name: Deploy to NAIS Prod
      # needs: build-jar-docker
      if: github.ref == 'refs/heads/main'
      runs-on: ubuntu-latest
      steps:
        - uses: nais/deploy/actions/deploy@v2
          env:
            CLUSTER: prod-gcp
            RESOURCE: .nais/nais-p.yaml
            IMAGE: ${{ steps.docker-push.outputs.image }}