name: Build and push and deploy
on:
  push:
    branches:
      - dev/**
      - main
  pull_request:
    branches:
      - dev/**
      - main
jobs:
  build_and_push:
    permissions:
      contents: "read"
      id-token: "write"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and test
        run: mvn --no-transfer-progress -B verify -Pcoverage

      - name: Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn --no-transfer-progress -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Pcoverage

      - uses: nais/docker-build-push@751a312f0803eb96a05a41fadf51be19b7be362c
        id: docker-push
        with:
          team: team-oebs # required
          tenant: nav # optional
          push_image: true
          pull: true
          dockerfile: Dockerfile
          docker_context: .
          cache_from: type=gha
          cache_to: type=gha,mode=max
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }} # required, but is defined as an organization variable
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }} # required, but is defined as an organization secret
          salsa: true

      - name: Deploy to NAIS (T1)
        if: startsWith(github.ref, 'refs/heads/dev/t1')  || github.ref == 'refs/heads/main'
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/nais-t1.yaml
          IMAGE: ${{ steps.docker-push.outputs.image }}

      - name: Deploy to NAIS (Q1)
        if: startsWith(github.ref, 'refs/heads/dev/q1')  || github.ref == 'refs/heads/main'
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/nais-q1.yaml
          IMAGE: ${{ steps.docker-push.outputs.image }}

      - name: Deploy to NAIS produksjon
        if: startsWith(github.ref, 'refs/heads/main')
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/nais-p.yaml
          IMAGE: ${{ steps.docker-push.outputs.image }}